<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>archolith dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --purple: #bc8cff;
    --mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header nav { display: flex; gap: 16px; }
  .header nav a { font-size: 13px; color: var(--text-dim); }
  .header nav a.active { color: var(--accent); }
  .header .status { margin-left: auto; font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  .header .status .ok { color: var(--green); }
  .header .status .err { color: var(--red); }

  .main { flex: 1; padding: 20px 24px; max-width: 1440px; margin: 0 auto; width: 100%; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 16px;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .card-header h2 { font-size: 14px; font-weight: 600; }

  /* Metrics grid */
  .metrics-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
  }
  .metric {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px; text-align: center;
  }
  .metric .value { font-size: 24px; font-weight: 700; font-family: var(--mono); }
  .metric .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }
  .metric .value.green { color: var(--green); }
  .metric .value.red { color: var(--red); }
  .metric .value.yellow { color: var(--yellow); }
  .metric .value.purple { color: var(--purple); }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--text-dim); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text); }
  th.sortable::after { content: ''; margin-left: 4px; }
  th.sort-asc::after { content: ' ▲'; }
  th.sort-desc::after { content: ' ▼'; }
  td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
  td:last-child, th:last-child { white-space: nowrap; min-width: 170px; }
  tr:hover { background: rgba(88,166,255,0.04); }
  tr { cursor: pointer; }
  .mono { font-family: var(--mono); font-size: 12px; }

  /* Tags */
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; font-weight: 500;
  }
  .tag.graph { background: rgba(63,185,80,0.15); color: var(--green); }
  .tag.curator { background: rgba(137,87,229,0.15); color: #a371f7; }
  .tag.fallback { background: rgba(248,81,73,0.15); color: var(--red); }
  .tag.passthrough { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .tag.cold_start { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .tag.agent_solo { background: rgba(56,139,253,0.12); color: #58a6ff; }
  .tag.agent_solo_compressed { background: rgba(56,253,139,0.12); color: #58ffaa; }
  .tag.skipped { background: rgba(139,148,158,0.1); color: var(--text-dim); }

  /* Toggle for hiding non-user turns */
  .timeline.user-only .turn-card[data-user-turn="false"] { display: none; }
  .timeline.user-only .bg-lane .bg-card { display: none; }
  .filter-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); cursor: pointer; user-select: none; }
  .filter-toggle input { cursor: pointer; }

  /* Session detail */
  .session-header { display: flex; gap: 24px; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; }
  .session-header .sid { font-family: var(--mono); font-size: 16px; font-weight: 600; word-break: break-all; }
  .session-header .goal { color: var(--text-dim); font-style: italic; max-width: 600px; }

  /* Turn timeline — two-lane grid (turns left, background passes right) */
  .timeline { position: relative; }
  .timeline-lanes {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0 12px;
    align-items: start;
  }
  .turn-lane { grid-column: 1; }
  .bg-lane {
    grid-column: 2;
    position: sticky;
    top: 60px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    padding: 0 0 8px 0;
  }
  .bg-lane-header {
    font-size: 11px; text-transform: uppercase; color: var(--text-dim);
    padding: 4px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
    font-weight: 600; letter-spacing: 0.5px;
  }
  .bg-card {
    background: var(--surface); border: 1px solid #d29922; border-radius: 6px;
    padding: 10px 12px; margin-bottom: 6px; font-size: 12px;
    border-left: 3px solid #d29922; cursor: pointer; transition: border-color 0.15s;
  }
  .bg-card:hover { border-color: #e8b940; }
  .bg-card.success { border-left-color: var(--green); }
  .bg-card.cancelled { border-left-color: var(--text-dim); }
  .bg-card.timeout { border-left-color: var(--red); }
  .bg-card.failed { border-left-color: var(--red); }
  .bg-card .bg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .bg-card .bg-trigger { font-family: var(--mono); font-weight: 700; font-size: 11px; }
  .bg-card .bg-outcome { font-size: 11px; font-weight: 600; }
  .bg-card .bg-outcome.success { color: var(--green); }
  .bg-card .bg-outcome.cancelled { color: var(--text-dim); }
  .bg-card .bg-outcome.timeout { color: var(--red); }
  .bg-card .bg-outcome.failed { color: var(--red); }
  .bg-card .bg-outcome.no_result { color: var(--yellow); }
  .bg-card .bg-outcome.pending { color: var(--text-dim); }
  .bg-card .bg-stats { color: var(--text-dim); font-family: var(--mono); font-size: 11px; }
  .bg-card .bg-detail { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .bg-card.selected .bg-detail { display: block; }
  .bg-empty { color: var(--text-dim); font-size: 12px; font-style: italic; padding: 12px 0; }
  @media (max-width: 1024px) {
    .timeline-lanes { grid-template-columns: 1fr; }
    .bg-lane { position: static; max-height: none; grid-column: 1; margin-top: 16px; }
  }

  .turn-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s;
  }
  .turn-card:hover { border-color: var(--accent); }
  .turn-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .turn-header { display: flex; align-items: center; gap: 12px; }
  .turn-num { font-family: var(--mono); font-weight: 700; font-size: 13px; min-width: 60px; }
  .turn-mode { flex-shrink: 0; }
  .turn-tokens { font-family: var(--mono); font-size: 12px; color: var(--text-dim); margin-left: auto; }
  .turn-latency { font-family: var(--mono); font-size: 12px; color: var(--text-dim); min-width: 80px; text-align: right; }
  .turn-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
  .turn-card.selected .turn-detail { display: block; }

  /* Prompt diff */
  .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .diff-pane { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow: auto; max-height: 500px; }
  .diff-pane h3 { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
  .diff-pane pre { font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
  .msg-role { font-weight: 700; color: var(--accent); }
  .msg-role.user { color: var(--green); }
  .msg-role.assistant { color: var(--purple); }

  /* Fact list */
  .fact-list { list-style: none; }
  .fact-list li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .fact-type { font-family: var(--mono); font-size: 11px; color: var(--purple); margin-right: 8px; }
  .fact-content { color: var(--text); }

  /* Latency bar */
  .latency-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; min-width: 60px; display: inline-block; vertical-align: middle; }
  .latency-bar .fill { height: 100%; border-radius: 3px; }
  .latency-bar .fill.fast { background: var(--green); }
  .latency-bar .fill.med { background: var(--yellow); }
  .latency-bar .fill.slow { background: var(--red); }

  /* Loading / empty */
  .loading { text-align: center; color: var(--text-dim); padding: 40px; }
  .empty { text-align: center; color: var(--text-dim); padding: 40px; font-style: italic; }
  .error-msg { color: var(--red); padding: 16px; background: rgba(248,81,73,0.08); border-radius: 6px; margin-bottom: 16px; }

  /* Back link */
  .back { font-size: 13px; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 6px; }

  /* Responsive */
  @media (max-width: 768px) {
    .diff-container { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>archolith</h1>
    <nav id="nav">
      <a href="#/" data-view="overview" class="active">overview</a>
      <a href="#/sessions" data-view="sessions">sessions</a>
    </nav>
    <div class="status" id="status-bar">connecting...</div>
  </div>
  <div class="main" id="content">
    <div class="loading">Loading...</div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// API client
// ---------------------------------------------------------------------------
const API_BASE = window.location.origin;

async function api(path) {
  const r = await fetch(`${API_BASE}${path}`);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

// ---------------------------------------------------------------------------
// Router (hash-based SPA)
// ---------------------------------------------------------------------------
const content = document.getElementById('content');
const nav = document.getElementById('nav');
const statusBar = document.getElementById('status-bar');

// Track what's been rendered to enable incremental updates
let currentView = null;   // 'overview' | 'sessions' | 'detail'
let detailState = { sessionId: null, turnCount: 0, turnIds: new Set(), bgPassIds: new Set() };
let sessionListState = { sessionIds: new Set(), sessions: [], sortKey: 'last_turn_at', sortDir: 'desc' };
let overviewBuilt = false;

function route() {
  const hash = location.hash.slice(1) || '/';
  nav.querySelectorAll('a').forEach(a => a.classList.remove('active'));
  // Reset incremental state on navigation
  detailState = { sessionId: null, turnCount: 0, turnIds: new Set(), bgPassIds: new Set() };
  sessionListState = { sessionIds: new Set(), sessions: [], sortKey: 'last_turn_at', sortDir: 'desc' };
  overviewBuilt = false;

  if (hash === '/') {
    nav.querySelector('[data-view="overview"]').classList.add('active');
    currentView = 'overview';
    renderOverview();
  } else if (hash === '/sessions') {
    nav.querySelector('[data-view="sessions"]').classList.add('active');
    currentView = 'sessions';
    renderSessionList();
  } else if (hash.startsWith('/sessions/')) {
    const sid = hash.split('/')[2];
    currentView = 'detail';
    detailState.sessionId = sid;
    renderSessionDetail(sid);
  } else {
    content.innerHTML = '<div class="empty">Unknown view</div>';
  }
}

window.addEventListener('hashchange', route);

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function ago(ts) {
  if (!ts) return '—';
  const d = Date.now() / 1000 - ts;
  if (d < 60) return `${Math.floor(d)}s ago`;
  if (d < 3600) return `${Math.floor(d / 60)}m ago`;
  if (d < 86400) return `${Math.floor(d / 3600)}h ago`;
  return `${Math.floor(d / 86400)}d ago`;
}

function fmtTs(ts) {
  if (!ts) return '—';
  const dt = new Date(ts * 1000);
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const time = `${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  const md = `${dt.getMonth()+1}/${dt.getDate()}`;
  const ageH = (now - dt) / 3_600_000;
  const rel = ago(ts);
  // Under 4 hours ago: just time + relative
  if (ageH < 4) return `${time} (${rel})`;
  // This year: month/day + time + relative
  if (dt.getFullYear() === now.getFullYear()) return `${md} ${time} (${rel})`;
  // Older: include year
  return `${md}/${dt.getFullYear().toString().slice(2)} ${time} (${rel})`;
}

function pct(v) {
  if (v == null || isNaN(v)) return '—';
  return `${(v * 100).toFixed(1)}%`;
}

function modeTag(mode) {
  const cls = mode === 'graph' ? 'graph' : mode === 'curator' ? 'curator' : mode === 'briefing' ? 'curator' : mode === 'briefing_stale' ? 'curator' : mode === 'fallback' ? 'fallback' : mode === 'cold_start' ? 'cold_start' : mode === 'agent_solo' ? 'agent_solo' : mode === 'agent_solo_compressed' ? 'agent_solo_compressed' : mode.startsWith('skipped') ? 'skipped' : 'passthrough';
  return `<span class="tag ${cls}">${mode}</span>`;
}

function fmtTokens(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function latencyBar(ms, max = 3000) {
  const ratio = Math.min(ms / max, 1);
  const cls = ratio < 0.3 ? 'fast' : ratio < 0.7 ? 'med' : 'slow';
  return `<span class="latency-bar"><span class="fill ${cls}" style="width:${ratio * 100}%"></span></span> <span class="mono">${Math.round(ms)}ms</span>`;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMessages(msgs) {
  if (!msgs || !msgs.length) return '<em style="color:var(--text-dim)">No messages captured</em>';
  return msgs.map(m => {
    const role = (m.role || 'unknown').toLowerCase();
    const roleCls = role === 'user' ? 'user' : role === 'assistant' ? 'assistant' : '';
    const content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content, null, 2);
    return `<div><span class="msg-role ${roleCls}">${escapeHtml(role)}:</span> ${escapeHtml(content).substring(0, 2000)}</div>`;
  }).join('\n');
}

// Build HTML for a single turn card (shared by initial render + append)
function buildTurnCard(t) {
  const savingsCls = t.savings_ratio > 0.3 ? 'green' : t.savings_ratio > 0.1 ? 'yellow' : 'red';
  const reasonStr = t.assembly_reason ? ` — ${escapeHtml(t.assembly_reason)}` : '';
  const fallbackStr = t.fallback_reason ? `<div style="color:var(--red);font-size:12px;margin-top:4px;">fallback: ${escapeHtml(t.fallback_reason)}</div>` : '';
  const curatorFailStr = t.curator_failure_reason ? `<div style="color:var(--red);font-size:12px;margin-top:4px;">curator failed: <span class="mono">${escapeHtml(t.curator_failure_reason)}</span></div>` : '';
  const curatorSkipStr = (t.curator_skip_reason && t.assembly_mode === 'passthrough' && t.is_user_turn)
    ? `<div style="color:var(--text-dim);font-size:12px;margin-top:4px;">curator skip: <span class="mono" style="color:var(--yellow)">${escapeHtml(t.curator_skip_reason)}</span></div>` : '';
  const rtkBadge = t.rtk_available === true
    ? `<span class="tag" style="background:rgba(35,134,54,0.15);color:#56d364;font-size:10px;padding:1px 5px;">RTK✓</span>`
    : t.rtk_available === false
      ? `<span class="tag" style="background:rgba(248,81,73,0.15);color:#f85149;font-size:10px;padding:1px 5px;" title="archolith_rtk not installed — filter fail-open">RTK✗</span>`
      : '';
  const rtkSavingsStr = t.rtk_chars_saved > 0
    ? ` · <span style="color:var(--text-dim)">rtk -${t.rtk_chars_saved.toLocaleString()}c</span>` : '';

  let factsHtml = '';
  if (t.facts_selected && t.facts_selected.length > 0) {
    factsHtml += '<h4 style="margin:8px 0 4px;font-size:12px;color:var(--text-dim)">Facts Injected</h4><ul class="fact-list">';
    t.facts_selected.forEach(f => {
      const ftype = f.type || f.fact_type || '?';
      const fcontent = f.content || f.text || f.summary || JSON.stringify(f).substring(0, 100);
      factsHtml += `<li><span class="fact-type">${escapeHtml(ftype)}</span><span class="fact-content">${escapeHtml(String(fcontent).substring(0, 200))}</span></li>`;
    });
    factsHtml += '</ul>';
  }
  if (t.files_selected && t.files_selected.length > 0) {
    factsHtml += '<h4 style="margin:8px 0 4px;font-size:12px;color:var(--accent)">Files Injected</h4><ul class="fact-list">';
    t.files_selected.forEach(f => {
      const fpath = f.path || f['s.path'] || '?';
      const fstatus = f.status || f['s.status'] || '';
      factsHtml += `<li><span class="fact-type">FILE</span><span class="fact-content">${escapeHtml(fpath)} <span style="color:var(--text-dim)">(${escapeHtml(fstatus)})</span></span></li>`;
    });
    factsHtml += '</ul>';
  }
  if (t.decisions_selected && t.decisions_selected.length > 0) {
    factsHtml += '<h4 style="margin:8px 0 4px;font-size:12px;color:var(--accent)">Decisions Injected</h4><ul class="fact-list">';
    t.decisions_selected.forEach(d => {
      const dsummary = d.summary || d['d.summary'] || '?';
      const dturn = d.turn || d['d.turn'] || '?';
      factsHtml += `<li><span class="fact-type">DEC</span><span class="fact-content">[t${escapeHtml(String(dturn))}] ${escapeHtml(String(dsummary).substring(0, 200))}</span></li>`;
    });
    factsHtml += '</ul>';
  }
  if (t.extracted_facts && t.extracted_facts.length > 0) {
    factsHtml += '<h4 style="margin:8px 0 4px;font-size:12px;color:var(--green)">Extracted Facts</h4><ul class="fact-list">';
    t.extracted_facts.forEach(f => {
      const ftype = f.type || f.fact_type || '?';
      const fcontent = f.content || f.text || f.summary || JSON.stringify(f).substring(0, 100);
      factsHtml += `<li><span class="fact-type">${escapeHtml(ftype)}</span><span class="fact-content">${escapeHtml(String(fcontent).substring(0, 200))}</span></li>`;
    });
    factsHtml += '</ul>';
  }
  if (t.facts_stored > 0 || t.duplicates_skipped > 0 || t.invalidations_attempted > 0) {
    factsHtml += `<div style="font-size:12px;color:var(--text-dim);margin-top:8px;">stored=${t.facts_stored} dupes=${t.duplicates_skipped} invalidations=${t.invalidations_attempted}/${t.invalidations_matched}</div>`;
  }
  if (t.recall_used) {
    const recallTriggerStr = t.recall_trigger
      ? `<span style="font-size:10px;opacity:0.7;margin-left:4px;">[${escapeHtml(t.recall_trigger)}]</span>`
      : '<span style="font-size:10px;opacity:0.7;margin-left:4px;">[model_invoked]</span>';
    factsHtml += `<div style="font-size:12px;color:var(--purple);margin-top:4px;">recall${recallTriggerStr}: "${escapeHtml(t.recall_question)}" → ${t.recall_facts_returned} facts</div>`;
  }

  return `
    <div class="turn-card" data-turn-id="${escapeHtml(t.turn_id)}" data-user-turn="${!!t.is_user_turn}" onclick="this.classList.toggle('selected')">
      <div class="turn-header">
        <span class="turn-num">t${t.turn_number}</span>
        <span style="font-size:11px;color:var(--text-dim);margin-right:4px;">${t.is_user_turn ? '👤' : '🤖'}</span>
        <span class="turn-mode">${modeTag(t.assembly_mode)}${reasonStr}${rtkBadge}</span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--text-dim);">${fmtTokens(t.input_tokens)} ctx${t.savings_tokens > 0 ? ` → ${fmtTokens(t.rewritten_tokens || t.input_tokens)} sent` : ''}</span>
        <span class="turn-tokens">${t.savings_tokens > 0 ? `<span class="${savingsCls}" style="color:var(--${savingsCls})">-${fmtTokens(t.savings_tokens)} (${pct(t.savings_ratio)})</span>` : ''}</span>
        <span class="turn-latency">${latencyBar(t.assembly_latency_ms + t.upstream_latency_ms)}</span>
      </div>
      ${fallbackStr}
      ${curatorFailStr}
      ${curatorSkipStr}
      <div class="turn-detail">
        <div style="margin-bottom:8px;font-size:11px;color:var(--text-dim);display:flex;gap:16px;flex-wrap:wrap;">
          ${t.model ? `<span>model: <span class="mono">${escapeHtml(t.model)}</span></span>` : ''}
          <span>user turn: <span class="mono">${t.user_turn_count || '?'}</span></span>
          ${t.curator_retained_turns ? `<span>retained turns: <span class="mono">[${t.curator_retained_turns.join(', ')}]</span></span>` : ''}
          ${t.briefing_source_turn != null ? `<span>briefing: <span class="mono">t${t.briefing_source_turn} · ${fmtTokens(t.briefing_chars)} chars · ${t.briefing_files} files</span></span>` : ''}
        </div>
        <div style="margin-bottom:12px;">

        </div>
        <div style="margin-bottom:12px;font-size:12px;color:var(--text-dim);">
          in=${fmtTokens(t.input_tokens)} → rew=${fmtTokens(t.rewritten_tokens)} · saved=${fmtTokens(t.savings_tokens)} (${pct(t.savings_ratio)}) · output=${fmtTokens(t.output_tokens) || '?'}${rtkSavingsStr}${t.cache_hit_tokens ? ` · <span style="color:var(--green)">cache ${fmtTokens(t.cache_hit_tokens)}/${fmtTokens(t.cache_hit_tokens+t.cache_miss_tokens)} (${pct(t.cache_hit_tokens/(t.cache_hit_tokens+t.cache_miss_tokens))})</span>` : ''}
        </div>
        ${factsHtml}

        <h4 style="margin:8px 0 4px;font-size:12px;color:var(--purple)">Curator Tool Log (${t.curator_tool_log.length} calls)</h4>
        <div style="font-size:12px;font-family:var(--mono);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px;max-height:200px;overflow:auto;">
          ${t.curator_tool_log.map(tc => {
            const statusColor = tc.status === 'ok' ? 'var(--green)' : tc.status === 'soft_error' ? 'var(--yellow)' : 'var(--red)';
            const detail = tc.error ? escapeHtml(tc.error) : tc.result_preview ? escapeHtml(tc.result_preview.substring(0, 100)) : '';
            const argsStr = tc.args ? Object.entries(tc.args).map(([k,v]) => k+'='+JSON.stringify(v).substring(0,60)).join(', ') : '';
            return `<div style="margin-bottom:2px;"><span style="color:${statusColor}">[${tc.status}]</span> <span style="color:var(--accent)">${escapeHtml(tc.tool)}</span>(${escapeHtml(argsStr)})${detail ? ' → '+detail : ''}</div>`;
          }).join('')}
        </div>
        ` : ''}
        ${t.curator_context_block ? `
        <details style="margin-top:8px;">
          <summary style="font-size:12px;color:var(--purple);cursor:pointer;user-select:none;">Curator Context Block (${fmtTokens(Math.round((t.curator_context_block||'').length/3))} est)</summary>
          <pre style="font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px;max-height:400px;overflow:auto;white-space:pre-wrap;margin-top:4px;">${escapeHtml(t.curator_context_block)}</pre>
        </details>
        ` : ''}
        <div class="diff-container" style="margin-top:12px;">
          <div class="diff-pane">
            <h3>Original Request (${t.message_count} msgs)</h3>
            <pre>${renderMessages(t.original_messages)}</pre>
          </div>
          <div class="diff-pane">
            <h3>Rewritten Payload</h3>
            <pre>${renderMessages(t.rewritten_messages)}</pre>
          </div>
        </div>
        ${t.upstream_response_summary ? `
        <div style="margin-top:12px;">
          <h4 style="font-size:12px;color:var(--text-dim);margin-bottom:4px;">Upstream Response (HTTP ${t.upstream_status})</h4>
          <pre style="font-family:var(--mono);font-size:12px;background:var(--bg);padding:8px;border-radius:4px;max-height:200px;overflow:auto;">${escapeHtml(t.upstream_response_summary)}</pre>
        </div>
        ` : ''}
        <div style="margin-top:8px;font-size:11px;color:var(--text-dim);">turn_id: <span class="mono">${escapeHtml(t.turn_id)}</span></div>
      </div>
    </div>
  `;
}

// Build HTML for a background pass card
function buildBgPassCard(bp) {
  const outcomeIcon = bp.outcome === 'success' ? '✔' : bp.outcome === 'cancelled' ? '✕' : bp.outcome === 'timeout' ? '⏱' : bp.outcome === 'failed' ? '✗' : '…';
  const latStr = bp.latency_ms ? `${(bp.latency_ms / 1000).toFixed(1)}s` : '—';

  let detailHtml = '';
  if (bp.debounce_ms) {
    detailHtml += `<div>debounce: <span class="mono">${bp.debounce_ms}ms</span></div>`;
  }
  if (bp.cancel_reason) {
    detailHtml += `<div style="color:var(--text-dim)">reason: ${escapeHtml(bp.cancel_reason)}</div>`;
  }
  if (bp.failure_detail) {
    detailHtml += `<div style="color:var(--red)">${escapeHtml(bp.failure_detail.substring(0, 200))}</div>`;
  }
  if (bp.tool_log && bp.tool_log.length > 0) {
    detailHtml += `<div style="margin-top:4px;font-family:var(--mono);font-size:11px;max-height:150px;overflow:auto;">`;
    bp.tool_log.forEach(tc => {
      const statusColor = tc.status === 'ok' ? 'var(--green)' : tc.status === 'soft_error' ? 'var(--yellow)' : 'var(--red)';
      const argsStr = tc.args ? Object.entries(tc.args).map(([k,v]) => k+'='+JSON.stringify(v).substring(0,40)).join(', ') : '';
      detailHtml += `<div><span style="color:${statusColor}">[${tc.status}]</span> ${escapeHtml(tc.tool)}(${escapeHtml(argsStr)})</div>`;
    });
    detailHtml += '</div>';
  }

  return `
    <div class="bg-card ${bp.outcome}" data-pass-id="${escapeHtml(bp.pass_id)}" onclick="this.classList.toggle('selected')">
      <div class="bg-header">
        <span class="bg-trigger">t${bp.trigger_turn}</span>
        <span class="bg-outcome ${bp.outcome}">${outcomeIcon} ${bp.outcome}</span>
        <span class="bg-stats" style="margin-left:auto;">${latStr}</span>
      </div>
      <div class="bg-stats">
        ${bp.tool_calls_count > 0 ? `tools: ${bp.tool_calls_count}` : ''}
        ${bp.files_fetched > 0 ? ` · files: ${bp.files_fetched}` : ''}
        ${bp.context_chars > 0 ? ` · ctx: ${fmtTokens(Math.round(bp.context_chars / 3))}` : ''}
        ${bp.briefing_cached ? ' · <span style="color:var(--green)">briefing ✔</span>' : ''}
      </div>
      <div class="bg-detail">${detailHtml}</div>
    </div>
  `;
}

            <div class="metric" data-key="fc_hits"><div class="value green">${m.native_read_cache_hits||0}</div><div class="label">Cache Hits</div></div>

      patch('input_tokens', m.total_input_tokens_seen || 0);
      patch('tokens_saved', m.token_savings_estimated || 0);

      patch('neo4j_errors', ne, ne > 0 ? 'red' : 'green');

      patch('trace_sessions', m.trace_sessions || 0, 'purple');
      patch('active_sessions', m.active_sessions || 0);
    }

    const curGrid = document.getElementById('curator-grid');
    if (curGrid) {
      const cpatch = (key, val, cls) => {
        const el = curGrid.querySelector(`[data-key="${key}"] .value`);
        if (!el) return;
        el.textContent = val;
        el.className = 'value' + (cls ? ' ' + cls : '');

      cpatch('cur_timeouts', m.curator_timeouts||0, (m.curator_timeouts||0)>0?'yellow':'');
      cpatch('cur_fallbacks', m.curator_fallbacks||0, (m.curator_fallbacks||0)>0?'red':'');
      const cr = m.curator_success_rate||0;
      cpatch('cur_rate', pct(cr), cr>0.8?'green':cr>0.5?'yellow':'red');
      cpatch('cur_latency', (m.avg_curator_latency_ms||0)+'ms');
      cpatch('cur_tools', m.avg_curator_tool_calls||0);
    }

    // Patch cache grid
    const cacheGrid = document.getElementById('cache-grid');
    if (cacheGrid) {
      const cpatch = (key, val, cls) => {
        const el = cacheGrid.querySelector(`[data-key="${key}"] .value`);
        if (!el) return;
        el.textContent = val;
        el.className = 'value' + (cls ? ' ' + cls : '');
      };
      cpatch('fc_hits', m.native_read_cache_hits||0, 'green');
      cpatch('fc_misses', m.native_read_cache_misses||0);
      const hr = m.file_cache_hit_rate||0;
      cpatch('fc_rate', pct(hr), hr>0.7?'green':hr>0.3?'yellow':'red');
      cpatch('fc_invalidations', m.file_cache_invalidations||0);
      cpatch('fc_errors', m.native_read_intercept_errors||0, (m.native_read_intercept_errors||0)>0?'red':'');
    }

    // Patch cost grid
    const costGrid = document.getElementById('cost-grid');
    if (costGrid) {
      const cpatch = (key, val, cls) => {
        const el = costGrid.querySelector(`[data-key="${key}"] .value`);
        if (!el) return;
        el.textContent = val;
        el.className = 'value' + (cls ? ' ' + cls : '');
      };
      cpatch('cost_input', '$' + (m.cost_input || 0).toFixed(4));
      cpatch('cost_output', '$' + (m.cost_output || 0).toFixed(4));
      cpatch('cost_total', '$' + (m.cost_total || 0).toFixed(4));
      cpatch('cost_savings', '$' + (m.cost_savings || 0).toFixed(4), 'green');
      cpatch('total_input', fmtTokens(m.total_input_tokens_seen || 0));
      cpatch('total_output', fmtTokens(m.total_output_tokens || 0));
      cpatch('total_saved', fmtTokens(m.token_savings_estimated || 0), 'green');
      cpatch('cache_hit_upstream', (m.total_cache_hit_tokens||0)>0 ? pct(m.cache_hit_rate_upstream) : 'n/a', (m.cache_hit_rate_upstream||0)>0.5?'green':'');
      cpatch('cache_hit_tokens', fmtTokens(m.total_cache_hit_tokens || 0));
      cpatch('cache_miss_tokens', fmtTokens(m.total_cache_miss_tokens || 0));
    }

    // Patch recent sessions table rows in-place
    const tbody = document.getElementById('recent-sessions-body');
    if (tbody && traceData.sessions && traceData.sessions.length > 0) {
      traceData.sessions.slice(0, 10).forEach(s => {
        const row = tbody.querySelector(`[data-session-id="${CSS.escape(s.session_id)}"]`);
        if (row) {
          row.children[1].textContent = `${s.max_user_turns || 0} / ${s.turn_count}`;
          row.children[2].textContent = pct(s.avg_savings_ratio);
          row.children[4].textContent = fmtTs(s.last_turn_at);
        }
      });
    }

    // Update status bar
    statusBar.innerHTML = `uptime ${Math.round(m.uptime_s || 0)}s · neo4j <span class="${m.graph_ready ? 'ok' : 'err'}">${m.graph_ready ? 'ok' : 'off'}</span> · traces ${m.trace_records || 0}`;

  } catch (e) {
    if (!overviewBuilt) {
      content.innerHTML = `<div class="error-msg">Failed to load overview: ${escapeHtml(e.message)}</div>`;
    }
  }
}

    <td class="mono">${escapeHtml(s.session_id)}</td>
    <td>${s.max_user_turns || 0}</td>
    <td>${s.turn_count}</td>
    <td>${pct(s.avg_savings_ratio)}</td>
    <td>${pct(s.rewritten_savings_ratio)}</td>
    <td>${s.total_input_tokens || 0}</td>
    <td>${s.total_savings_tokens || 0}</td>
    <td>${s.total_facts_stored || 0}</td>
    <td>${s.total_duplicates_skipped || 0}</td>
    <td>${s.total_invalidations_attempted || 0}</td>
    <td>${Object.entries(s.assembly_modes || {}).map(([k,v]) => `${modeTag(k)}×${v}`).join(' ')}</td>
    <td>${fmtTs(s.last_turn_at)}</td>
  `;
}

function buildSortedRows(sessions) {
  const { sortKey, sortDir } = sessionListState;
  const sorted = [...sessions].sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    // Nulls sort last regardless of direction
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  return sorted.map(s => {
    const tr = document.createElement('tr');
    tr.setAttribute('data-session-id', s.session_id);
    tr.setAttribute('onclick', `location.hash='/sessions/${s.session_id}'`);
    tr.innerHTML = sessionRowHtml(s);
    return tr;
  });
}

function rebuildSessionTableBody() {
  const tbody = document.getElementById('session-list-body');
  if (!tbody) return;
  const rows = buildSortedRows(sessionListState.sessions);
  tbody.replaceChildren(...rows);
}

function onSessionHeaderClick(key) {
  if (sessionListState.sortKey === key) {
    sessionListState.sortDir = sessionListState.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sessionListState.sortKey = key;
    sessionListState.sortDir = 'desc';
  }
  // Update header indicators
  document.querySelectorAll('#session-list-head th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.sortKey === key) {
      th.classList.add(sessionListState.sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });
  rebuildSessionTableBody();
}

async function renderSessionList() {
  try {
    const data = await api('/trace/sessions');
    if (!data.sessions || data.sessions.length === 0) {
      content.innerHTML = '<div class="empty">No traced sessions yet</div>';
      return;
    }

    const tbody = document.getElementById('session-list-body');

    // First load — build the full table with sortable headers
    if (!tbody) {
      sessionListState.sessions = data.sessions;
      data.sessions.forEach(s => sessionListState.sessionIds.add(s.session_id));

      const headerCells = SESSION_COLUMNS.map(c => {
        const cls = c.sortable ? ` class="sortable${c.key === sessionListState.sortKey ? ` sort-${sessionListState.sortDir}` : ''}"` : '';
        const click = c.sortable ? ` data-sort-key="${c.key}" onclick="onSessionHeaderClick('${c.key}')"` : '';
        return `<th${cls}${click}>${c.label}</th>`;
      }).join('');

      content.innerHTML = `
        <div class="card">
          <div class="card-header"><h2 id="session-count">Sessions (${data.count})</h2></div>
          <table>
            <thead id="session-list-head"><tr>${headerCells}</tr></thead>
            <tbody id="session-list-body"></tbody>
          </table>
        </div>
      `;
      rebuildSessionTableBody();
      return;
    }

    // Incremental — merge new data into cached sessions and re-sort
    let changed = false;
    data.sessions.forEach(s => {
      const idx = sessionListState.sessions.findIndex(x => x.session_id === s.session_id);
      if (idx >= 0) {
        const old = sessionListState.sessions[idx];
        if (old.turn_count !== s.turn_count || old.last_turn_at !== s.last_turn_at
            || old.total_savings_tokens !== s.total_savings_tokens) {
          sessionListState.sessions[idx] = s;
          changed = true;
        }
      } else if (!sessionListState.sessionIds.has(s.session_id)) {
        sessionListState.sessionIds.add(s.session_id);
        sessionListState.sessions.push(s);
        changed = true;
      }
    });
    if (changed) rebuildSessionTableBody();

    // Update count
    const countEl = document.getElementById('session-count');
    if (countEl) countEl.textContent = `Sessions (${data.count})`;

  } catch (e) {
    if (!document.getElementById('session-list-body')) {
      content.innerHTML = `<div class="error-msg">Failed to load sessions: ${escapeHtml(e.message)}</div>`;
    }
  }
}

// ---------------------------------------------------------------------------
// Session Detail — initial build + append-only new turns
// ---------------------------------------------------------------------------
async function renderSessionDetail(sessionId) {
  try {
    const [data, metricsData] = await Promise.all([
      api(`/trace/sessions/${sessionId}`),
      api('/metrics'),
    ]);
    const summary = data.summary || {};
    const turns = data.turns || [];
    const bgPasses = data.background_passes || [];

    // First load — full render
    if (detailState.turnCount === 0) {
      // Compute per-session derived stats from turns
      let sesInputTokens = 0, sesOutputTokens = 0, sesSavedTokens = 0;
      let sesCuratorCount = 0, sesCuratorTimeouts = 0, sesCuratorLatencySum = 0, sesCuratorToolCalls = 0;
      turns.forEach(t => {
        sesInputTokens += t.input_tokens || 0;
        sesOutputTokens += t.output_tokens || 0;
        sesSavedTokens += t.savings_tokens || 0;
        if (t.assembly_mode === 'curator' || t.assembly_mode === 'briefing' || t.assembly_mode === 'briefing_stale') {
          sesCuratorCount++;
          sesCuratorLatencySum += t.assembly_latency_ms || 0;
          sesCuratorToolCalls += (t.curator_tool_log || []).length;
        }
        if (t.assembly_mode === 'passthrough' && t.is_user_turn && t.turn_number >= 3) sesCuratorTimeouts++;
      });
      const sesDuration = (summary.last_turn_at && summary.first_turn_at) ? summary.last_turn_at - summary.first_turn_at : 0;
      const sesDurationStr = sesDuration < 60 ? `${Math.floor(sesDuration)}s` : sesDuration < 3600 ? `${Math.floor(sesDuration/60)}m` : `${(sesDuration/3600).toFixed(1)}h`;
      const sesAvgCurLatency = sesCuratorCount > 0 ? Math.round(sesCuratorLatencySum / sesCuratorCount) : 0;
      const sesAvgCurTools = sesCuratorCount > 0 ? (sesCuratorToolCalls / sesCuratorCount).toFixed(1) : '0';

      let html = `
        <a class="back" href="#/sessions">← sessions</a>
        <div class="session-header">
          <div>
            <div class="sid">${escapeHtml(sessionId)}</div>
            ${summary.goal ? `<div class="goal">"${escapeHtml(summary.goal)}"</div>` : ''}
          </div>
          <div class="metrics-grid" style="flex:1;min-width:300px;" id="detail-metrics">
            <div class="metric" data-key="turns"><div class="value">${summary.max_user_turns || 0}</div><div class="label">User Turns</div></div>
            <div class="metric" data-key="api_calls"><div class="value">${summary.turn_count || 0}</div><div class="label">API Calls</div></div>
            <div class="metric" data-key="duration"><div class="value">${sesDurationStr}</div><div class="label">Duration</div></div>
            <div class="metric" data-key="in_tokens"><div class="value">${fmtTokens(summary.total_input_tokens || 0)}</div><div class="label">In Tokens</div></div>
            <div class="metric" data-key="out_tokens"><div class="value">${fmtTokens(sesOutputTokens)}</div><div class="label">Out Tokens</div></div>
            <div class="metric" data-key="saved_tokens"><div class="value green">${fmtTokens(summary.total_savings_tokens || 0)}</div><div class="label">Saved Tokens</div></div>
            <div class="metric" data-key="savings"><div class="value">${pct(summary.avg_savings_ratio)}</div><div class="label">Overall Savings</div></div>
            <div class="metric" data-key="rew_savings"><div class="value">${pct(summary.rewritten_savings_ratio)}</div><div class="label">Curator Savings</div></div>
            <div class="metric" data-key="facts"><div class="value">${summary.total_facts_stored || 0}</div><div class="label">Facts Stored</div></div>
            <div class="metric" data-key="recalls"><div class="value">${summary.total_recalls || 0}</div><div class="label">Recalls</div></div>
            <div class="metric" data-key="cur_runs"><div class="value">${sesCuratorCount}</div><div class="label">Curator Runs</div></div>
            <div class="metric" data-key="cur_avg_lat"><div class="value">${sesAvgCurLatency}ms</div><div class="label">Avg Curator Lat</div></div>
            <div class="metric" data-key="cur_avg_tools"><div class="value">${sesAvgCurTools}</div><div class="label">Avg Tool Calls</div></div>
          </div>
        </div>
      `;

      const modes = summary.assembly_modes || {};
      if (Object.keys(modes).length > 0) {
        html += `
          <div class="card" id="mode-distribution">
            <div class="card-header"><h2>Mode Distribution</h2></div>
            <div class="metrics-grid">
              ${Object.entries(modes).map(([k,v]) => `
                <div class="metric"><div class="value">${v}</div><div class="label">${modeTag(k)}</div></div>
              `).join('')}
            </div>
          </div>
        `;
      }

      // Per-session cost estimation
      const pricing = metricsData.pricing || {};
      const pInM = pricing.input_per_million || 0.14;
      const pOutM = pricing.output_per_million || 0.28;
      const sesCostIn = sesInputTokens * pInM / 1_000_000;
      const sesCostOut = sesOutputTokens * pOutM / 1_000_000;
      const sesCostTotal = sesCostIn + sesCostOut;
      const sesCostSaved = sesSavedTokens * pInM / 1_000_000;
      html += `
        <div class="card">
          <div class="card-header"><h2>Session Cost</h2><span style="font-size:11px;color:var(--text-dim);">$${pInM}/M in · $${pOutM}/M out</span></div>
          <div class="metrics-grid">
            <div class="metric"><div class="value">\$${sesCostIn.toFixed(4)}</div><div class="label">Input Cost</div></div>
            <div class="metric"><div class="value">\$${sesCostOut.toFixed(4)}</div><div class="label">Output Cost</div></div>
            <div class="metric"><div class="value">\$${sesCostTotal.toFixed(4)}</div><div class="label">Total Cost</div></div>
            <div class="metric"><div class="value green">\$${sesCostSaved.toFixed(4)}</div><div class="label">Savings</div></div>
          </div>
        </div>
      `;

      html += `<div class="card"><div class="card-header"><h2>Turn Timeline</h2><label class="filter-toggle"><input type="checkbox" id="user-only-toggle" onchange="document.getElementById('timeline').classList.toggle('user-only', this.checked)"> User turns only</label></div><div class="timeline" id="timeline"><div class="timeline-lanes">`;
      // Left lane — turns
      html += '<div class="turn-lane" id="turn-lane">';
      if (turns.length === 0) {
        html += '<div class="empty">No turns recorded</div>';
      } else {
        turns.forEach(t => {
          detailState.turnIds.add(t.turn_id);
          html += buildTurnCard(t);
        });
      }
      html += '</div>';
      // Right lane — background passes
      html += '<div class="bg-lane" id="bg-lane">';
      html += '<div class="bg-lane-header">Background Passes</div>';
      if (bgPasses.length === 0) {
        html += '<div class="bg-empty">No background passes recorded</div>';
      } else {
        bgPasses.forEach(bp => { html += buildBgPassCard(bp); });
      }
      html += '</div>';
      html += '</div></div></div>';

      content.innerHTML = html;
      detailState.turnCount = turns.length;
      return;
    }

    // Incremental update — patch metrics, append new turns only
    const metricsGrid = document.getElementById('detail-metrics');
    if (metricsGrid) {
      const patch = (key, val) => {
        const el = metricsGrid.querySelector(`[data-key="${key}"] .value`);
        if (el) el.textContent = val;
      };
      patch('turns', summary.max_user_turns || 0);
      patch('api_calls', summary.turn_count || 0);
      patch('in_tokens', summary.total_input_tokens || 0);
      patch('saved_tokens', summary.total_savings_tokens || 0);
      patch('savings', pct(summary.avg_savings_ratio));
      patch('rew_savings', pct(summary.rewritten_savings_ratio));
      patch('facts', summary.total_facts_stored || 0);
      patch('dupes', summary.total_duplicates_skipped || 0);
      patch('invalidations', summary.total_invalidations_attempted || 0);
      patch('recalls', summary.total_recalls || 0);
    }

    // Find new turns and append them to the turn lane
    const turnLane = document.getElementById('turn-lane');
    if (turnLane && turns.length > detailState.turnCount) {
      const newTurns = turns.slice(detailState.turnCount);
      newTurns.forEach(t => {
        if (!detailState.turnIds.has(t.turn_id)) {
          detailState.turnIds.add(t.turn_id);
          const wrapper = document.createElement('div');
          wrapper.innerHTML = buildTurnCard(t);
          const card = wrapper.firstElementChild;
          card.style.opacity = '0';
          turnLane.appendChild(card);
          requestAnimationFrame(() => { card.style.transition = 'opacity 0.3s'; card.style.opacity = '1'; });
        }
      });
      detailState.turnCount = turns.length;

      // Auto-scroll only if user is near bottom
      if (!userScrolledUp) {
        turnLane.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    // Find new BG passes and append them to the BG lane
    const bgLane = document.getElementById('bg-lane');
    if (bgLane && bgPasses.length > 0) {
      const existingIds = new Set([...bgLane.querySelectorAll('.bg-card')].map(el => el.dataset.passId));
      bgPasses.forEach(bp => {
        if (!existingIds.has(bp.pass_id)) {
          // Remove the "no passes" placeholder if present
          const placeholder = bgLane.querySelector('.bg-empty');
          if (placeholder) placeholder.remove();
          const wrapper = document.createElement('div');
          wrapper.innerHTML = buildBgPassCard(bp);
          const card = wrapper.firstElementChild;
          card.style.opacity = '0';
          bgLane.appendChild(card);
          requestAnimationFrame(() => { card.style.transition = 'opacity 0.3s'; card.style.opacity = '1'; });
        }
      });
    }

  } catch (e) {
    if (detailState.turnCount === 0) {
      content.innerHTML = `
        <a class="back" href="#/sessions">← sessions</a>
        <div class="error-msg">Failed to load session: ${escapeHtml(e.message)}</div>
      `;
    }
  }
}

// ---------------------------------------------------------------------------
// Auto-refresh — polls for incremental updates
// ---------------------------------------------------------------------------
let refreshTimer = null;
let userScrolledUp = false;

function startAutoRefresh() {
  clearInterval(refreshTimer);
  userScrolledUp = false;
  const hash = location.hash.slice(1) || '/';
  if (hash === '/') {
    refreshTimer = setInterval(renderOverview, 10000);
  } else if (hash === '/sessions') {
    refreshTimer = setInterval(renderSessionList, 10000);
  } else if (hash.startsWith('/sessions/')) {
    const sid = hash.split('/sessions/')[1];
    refreshTimer = setInterval(() => renderSessionDetail(sid), 5000);
  }
}
window.addEventListener('hashchange', () => { route(); startAutoRefresh(); });

// Track user scroll — listen on window since that's where the page scrolls
window.addEventListener('scroll', () => {
  const atBottom = document.documentElement.scrollHeight - window.scrollY - window.innerHeight < 100;
  userScrolledUp = !atBottom;
});

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
route();
startAutoRefresh();
</script>
</body>
</html>

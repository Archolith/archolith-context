services:
  archolith-proxy:
    build: .
    ports:
      - "9800:9800"
    environment:
      # Required — override these in .env or at runtime
      - UPSTREAM_API_KEY=${UPSTREAM_API_KEY:-}
      - EXTRACTOR_API_KEY=${EXTRACTOR_API_KEY:-}
      # Deployment profile (passthrough | mechanical | curated | full)
      - ARCHOLITH_PROFILE=${ARCHOLITH_PROFILE:-mechanical}
      # Upstream and extraction endpoints
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-https://api.deepseek.com/v1}
      - EXTRACTOR_BASE_URL=${EXTRACTOR_BASE_URL:-https://api.openai.com/v1}
      - EXTRACTOR_MODEL=${EXTRACTOR_MODEL:-gpt-4.1-mini}
      # Graph backend: LadybugDB (embedded, zero-infra default)
      - GRAPH_BACKEND=ladybug
      - LADYBUG_DB_PATH=/app/data/context.lbug
      - LADYBUG_MAX_CONCURRENT=8
      # Embeddings (optional)
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - archolith_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:9800/live'); assert r.status_code == 200"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Optional: Neo4j graph backend (use instead of LadybugDB for production workloads)
  # Enable with: docker compose --profile neo4j up
  neo4j:
    profiles: ["neo4j"]
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

volumes:
  archolith_data:
  neo4j_data:
  neo4j_logs:
